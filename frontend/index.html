<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D32F2F" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <script>
      (function () {
        try {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.classList.add('theme-dark');
        } catch (e) {}
      })();
    </script>
    <title>Jeu de pendu en Suisse-allemand</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="/config.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <button id="theme-btn" class="theme-toggle" type="button" aria-label="Passer en mode clair" aria-pressed="true" title="Passer en mode clair">
          <svg class="theme-toggle__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <defs>
              <clipPath id="themeHalfClip"><rect x="0" y="0" width="12" height="24" /></clipPath>
            </defs>
            <circle cx="12" cy="12" r="8.5" fill="#f8fafc" />
            <circle cx="12" cy="12" r="8.5" fill="#111827" clip-path="url(#themeHalfClip)" />
            <circle cx="12" cy="12" r="8.5" fill="none" stroke="#111827" stroke-width="1.2" />
            <path d="M12 1.8v2.2M12 20v2.2M1.8 12H4M20 12h2.2M4.3 4.3l1.5 1.5M18.2 18.2l1.5 1.5M19.7 4.3l-1.5 1.5M5.8 18.2l-1.5 1.5" stroke="#d1d5db" stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </button>
        <h1>Jeu de pendu en Suisse-allemand</h1>
      </header>

      <section class="controls" aria-label="Actions de jeu">
        <button id="new-game-btn" class="action-btn" type="button">Nouvelle partie</button>
        <button id="direction-btn" class="action-btn action-btn--ghost" type="button">FR → DE-CH</button>
      </section>

      <section class="hint-card" aria-live="polite">
        <div class="hint-label">Indice</div>
        <div id="hint-text" class="hint-text">—</div>
        <div id="hint-meta" class="hint-meta"></div>
      </section>

      <section class="hangman-card" aria-label="Dessins du pendu">
        <svg id="hangman-svg" viewBox="0 0 240 240" role="img" aria-label="Pendu">
          <g class="hangman-base">
            <path d="M20 220 H220" />
            <path d="M60 220 V20 H150" />
            <path d="M150 20 V40" />
          </g>
          <g class="hangman-part" data-part="head">
            <circle cx="150" cy="62" r="18" />
          </g>
          <g class="hangman-part" data-part="body">
            <path d="M150 80 V130" />
          </g>
          <g class="hangman-part" data-part="left-arm">
            <path d="M150 92 L126 112" />
          </g>
          <g class="hangman-part" data-part="right-arm">
            <path d="M150 92 L174 112" />
          </g>
          <g class="hangman-part" data-part="left-leg">
            <path d="M150 130 L130 164" />
          </g>
          <g class="hangman-part" data-part="right-leg">
            <path d="M150 130 L170 164" />
          </g>
          <g class="hangman-part" data-part="final-mark">
            <path d="M135 52 L172 89" />
            <path d="M172 52 L135 89" />
          </g>
        </svg>
      </section>

      <section class="word-card" aria-live="polite">
        <div id="word-display" class="word-display" aria-label="Mot à deviner"></div>
      </section>

      <section class="status-card" aria-live="polite">
        <div id="status-text" class="status-text"></div>
      </section>

      <section class="keyboard-card" aria-label="Clavier virtuel">
        <div id="keyboard" class="keyboard"></div>
      </section>

      <footer class="app-footer">
        <div id="app-version" class="app-version">v1.0.6</div>
        <div class="app-credit">Créé via AI par <a href="mailto:info@418.ch">Nicolas</a></div>
      </footer>
    </main>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>

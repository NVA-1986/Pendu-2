<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Admin Pendu Schwiiz</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section id="login-view" class="panel">
        <h1>Admin Pendu Schwiiz</h1>
        <form id="login-form" class="stack">
          <label>
            Mot de passe
            <input id="password-input" type="password" autocomplete="current-password" required />
          </label>
          <button class="btn" type="submit">Se connecter</button>
          <p id="login-error" class="error" hidden></p>
        </form>
      </section>

      <section id="app-view" class="hidden">
        <header class="admin-header panel">
          <div>
            <h1>Administration</h1>
            <p class="muted">Stats & dictionnaire</p>
          </div>
          <button id="logout-btn" class="btn btn--ghost" type="button">Déconnexion</button>
        </header>

        <nav class="tabs panel">
          <button class="tab is-active" data-tab="stats" type="button">Stats</button>
          <button class="tab" data-tab="dictionary" type="button">Dictionnaire</button>
        </nav>

        <section id="tab-stats" class="panel tab-panel">
          <div class="kpis" id="summary-kpis"></div>
          <div class="grid-2">
            <div>
              <h2>Parties récentes</h2>
              <div class="table-wrap"><table id="sessions-table" class="table"></table></div>
            </div>
            <div>
              <h2>Stats des mots</h2>
              <div class="table-wrap"><table id="word-stats-table" class="table"></table></div>
            </div>
          </div>
        </section>

        <section id="tab-dictionary" class="panel tab-panel hidden">
          <div class="grid-2">
            <div>
              <h2>Ajouter / modifier un mot</h2>
              <form id="word-form" class="stack">
                <input type="hidden" id="word-id" />
                <label>Mot<input id="word-input" required /></label>
                <label>Traduction FR<input id="translation-input" /></label>
                <label>Allemand / dialecte<input id="deutch-input" /></label>
                <label>Hint région<input id="hint-input" /></label>
                <label>Catégorie<input id="category-input" /></label>
                <label>Dialecte<input id="dialect-input" /></label>
                <label>Longueur<input id="length-input" type="number" min="1" /></label>
                <label class="checkbox-row"><input id="enabled-input" type="checkbox" checked /> Mot actif</label>
                <div class="row">
                  <button class="btn" type="submit">Enregistrer</button>
                  <button id="word-reset" class="btn btn--ghost" type="button">Nouveau</button>
                </div>
              </form>
            </div>
            <div>
              <h2>Dictionnaire</h2>
              <form id="import-form" class="stack" style="margin-bottom:10px;">
                <label>Importer JSON
                  <input id="import-file" type="file" accept="application/json,.json" required />
                </label>
                <label class="checkbox-row"><input id="import-replace" type="checkbox" /> Remplacer tout le dictionnaire</label>
                <button class="btn btn--ghost" type="submit">Importer</button>
              </form>
              <div class="row" style="margin-bottom:10px;">
                <button id="enable-all-btn" class="btn btn--ghost" type="button">Tout activer</button>
                <button id="disable-all-btn" class="btn btn--ghost" type="button">Tout désactiver</button>
              </div>
              <div class="table-wrap"><table id="words-table" class="table"></table></div>
            </div>
          </div>
        </section>
      </section>
    </main>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
